# Chant 统一入口 nginx 配置
#
# 架构:
#   浏览器 --HTTPS--> nginx (:443)
#                       ├── /api/v1/auth/*  -->  auth_service  (:9030, HTTP)
#                       ├── /api/v1/*       -->  chat_service  (:8080, HTTP)
#                       ├── /api/v1/ws      -->  chat_service  (:8080, WebSocket)
#                       └── 其余路径         -->  front_code/dist 静态文件

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # ---------- SSL 证书 ----------
    # 测试阶段用自签名证书，正式上线替换为 Let's Encrypt
    ssl_certificate     /etc/nginx/ssl/chant.crt;
    ssl_certificate_key /etc/nginx/ssl/chant.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ---------- 前端静态文件 ----------
    root /home/ubuntu/front_code/dist;
    index index.html;

    # ---------- auth_service ----------
    location /api/v1/auth/ {
        proxy_pass http://127.0.0.1:9030;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- chat_service ----------
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- WebSocket ----------
    location /api/v1/ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ---------- 前端 SPA fallback ----------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
