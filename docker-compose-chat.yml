networks:
  chant-shared-network:
    driver: bridge

services:
  zookeeper:
    image: docker.m.daocloud.io/wurstmeister/zookeeper
    container_name: zookeeper
    ports: ["2181:2181"]
    networks: [chant-shared-network]

  kafka:
    image: docker.m.daocloud.io/wurstmeister/kafka
    container_name: kafka
    ports: ["9094:9092"]
    environment:
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on: [zookeeper]
    networks: [chant-shared-network]

  postgres:
    image: docker.m.daocloud.io/library/postgres:15-alpine
    container_name: postgres
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orchestrator
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [chant-shared-network]

  mongodb:
    image: docker.m.daocloud.io/library/mongo:6
    container_name: mongodb
    ports: ["27017:27017"]
    networks: [chant-shared-network]

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: redis
    ports: ["6379:6379"]
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [chant-shared-network]

  auth-service:
    build:
      context: .
      dockerfile: ./services/auth_service/Dockerfile
    container_name: auth-service
    ports: ["9030:9030", "50051:50051", "50052:50052"]
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      DATABASE_NAME: auth
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CLIENT_ID: auth-service
      KAFKA_TOPIC_SAGA_EVENTS: saga-events
      KAFKA_TOPIC_USER_REGISTERED: user-registrations
      KAFKA_TOPIC_USER_UPDATED: user-updates
      KAFKA_TOPIC_SYNC_USER_FIELDS: sync_user_fields
      HOST: 0.0.0.0
      PORT: 9030
      DEBUG: "true"
      TZ: Asia/Shanghai
    depends_on:
      mongodb: { condition: service_started }
      redis: { condition: service_healthy }
      kafka: { condition: service_started }
    networks: [chant-shared-network]
    restart: on-failure

  chat-service:
    build:
      context: .
      dockerfile: ./services/chat_service/Dockerfile
    container_name: chat-service
    ports: ["8080:8080"]
    environment:
      CHAT_GROUP_ID: chat-local
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB_NAME: orchestrator
      MONGODB_HOST: mongodb
      MONGODB_PORT: "27017"
      MONGODB_DB_NAME: chat
      KAFKA_BROKERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      AUTH_GRPC_ADDR: auth-service:50051
      LAST_OFFLINE_GRPC_ADDR: auth-service:50052
      SERVER_PORT: "8080"
      TZ: Asia/Shanghai
    depends_on:
      postgres: { condition: service_healthy }
      mongodb: { condition: service_started }
      redis: { condition: service_healthy }
      kafka: { condition: service_started }
      auth-service: { condition: service_started }
    networks: [chant-shared-network]
    restart: on-failure
