version: '3.8'
services:
  consul:
    image: consul:latest
    container_name: consul
    ports:
      - "8500:8500"      # Web UI
      - "8600:8600/udp"  # DNS
    environment:
      - CONSUL_BIND_INTERFACE=eth0
    command: >
      consul agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
      -datacenter=dc1 -data-dir=/consul/data -node=consul-server-1
    volumes:
      - consul-data:/consul/data
    networks:
      - infrastructure-net

volumes:
  consul-data:

networks:
  infrastructure-net:
    driver: bridge
    name: infrastructure-net
