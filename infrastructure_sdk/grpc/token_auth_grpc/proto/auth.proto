// auth.proto
syntax = "proto3";

package grpc;

option go_package = "infrastructure_sdk/token_auth_grpc/proto";

service AuthService {
  rpc VerifyToken(VerifyTokenRequest) returns (VerifyTokenResponse);
  rpc GetUserByID(GetUserByIDRequest) returns (GetUserByIDResponse);
}

message VerifyTokenRequest {
  string token = 1;
}

message VerifyTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string username = 3;
  string email = 4;
  string message = 5;
}

message GetUserByIDRequest {
  string user_id = 1;
}

message GetUserByIDResponse {
  bool found = 1;
  string user_id = 2;
  string username = 3;
  string email = 4;
  string status = 5;
  string message = 6;
}
