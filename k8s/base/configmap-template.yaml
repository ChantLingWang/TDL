# ConfigMap模板 - 管理应用的配置数据
# 分离配置和代码，支持环境变量和配置文件两种方式

apiVersion: v1
kind: ConfigMap
metadata:
  name: ${SERVICE_NAME}-config  # 配置名称
  namespace: ${NAMESPACE}
  labels:
    app: ${SERVICE_NAME}
    type: config
data:
  # 环境变量形式的配置
  SERVICE_NAME: "${SERVICE_NAME}"
  SERVICE_VERSION: "${VERSION}"
  ENVIRONMENT: "${ENVIRONMENT}"
  LOG_LEVEL: "${LOG_LEVEL:info}"
  LOG_FORMAT: "${LOG_FORMAT:json}"
  
  # 数据库配置
  DB_HOST: "${DB_HOST:mysql}"
  DB_PORT: "${DB_PORT:3306}"
  DB_NAME: "${DB_NAME:${SERVICE_NAME}}"
  DB_CHARSET: "${DB_CHARSET:utf8mb4}"
  
  # Redis配置
  REDIS_HOST: "${REDIS_HOST:redis}"
  REDIS_PORT: "${REDIS_PORT:6379}"
  REDIS_DB: "${REDIS_DB:0}"
  
  # Kafka配置
  KAFKA_BROKERS: "${KAFKA_BROKERS:kafka:9092}"
  KAFKA_CONSUMER_GROUP: "${SERVICE_NAME}-group"
  
  # 服务发现配置
  SERVICE_DISCOVERY_HOST: "${SERVICE_DISCOVERY_HOST:consul}"
  SERVICE_DISCOVERY_PORT: "${SERVICE_DISCOVERY_PORT:8500}"
  
  # 监控配置
  METRICS_ENABLED: "${METRICS_ENABLED:true}"
  METRICS_PORT: "${METRICS_PORT:8080}"
  METRICS_PATH: "${METRICS_PATH:/metrics}"
  HEALTH_CHECK_PATH: "${HEALTH_CHECK_PATH:/health}"
  READINESS_CHECK_PATH: "${READINESS_CHECK_PATH:/ready}"
  
  # 业务配置
  API_RATE_LIMIT: "${API_RATE_LIMIT:1000}"
  API_TIMEOUT: "${API_TIMEOUT:30}"
  CACHE_TTL: "${CACHE_TTL:3600}"
  
  # 安全配置
  CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:*}"
  CORS_ALLOWED_METHODS: "${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}"
  CORS_ALLOWED_HEADERS: "${CORS_ALLOWED_HEADERS:Content-Type,Authorization}"
  
  # 应用特定配置（根据服务类型调整）
  # Auth服务特有
  JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
  JWT_EXPIRATION: "${JWT_EXPIRATION:86400}"
  TOKEN_REFRESH_THRESHOLD: "${TOKEN_REFRESH_THRESHOLD:7200}"
  
  # User服务特有  
  USER_CACHE_PREFIX: "user:"
  USER_SESSION_TIMEOUT: "${USER_SESSION_TIMEOUT:1800}"
  
  # Collaboration服务特有
  COLLAB_ROOM_MAX_USERS: "${COLLAB_ROOM_MAX_USERS:100}"
  COLLAB_MESSAGE_BUFFER_SIZE: "${COLLAB_MESSAGE_BUFFER_SIZE:1000}"
  
  # 配置文件形式（挂载到容器内）
  application.yml: |
    server:
      port: ${SERVER_PORT:8080}
      servlet:
        context-path: ${CONTEXT_PATH:/}
    
    spring:
      application:
        name: ${SERVICE_NAME}
      profiles:
        active: ${SPRING_PROFILES_ACTIVE:prod}
      datasource:
        url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=UTC
        username: ${DB_USERNAME:root}
        password: ${DB_PASSWORD:password}
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
          maximum-pool-size: ${DB_POOL_SIZE:10}
          minimum-idle: ${DB_POOL_MIN:5}
          connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
    
      redis:
        host: ${REDIS_HOST}
        port: ${REDIS_PORT}
        database: ${REDIS_DB}
        timeout: ${REDIS_TIMEOUT:2000}
        lettuce:
          pool:
            max-active: ${REDIS_POOL_MAX_ACTIVE:8}
            max-idle: ${REDIS_POOL_MAX_IDLE:8}
            min-idle: ${REDIS_POOL_MIN_IDLE:0}
    
      kafka:
        bootstrap-servers: ${KAFKA_BROKERS}
        producer:
          retries: ${KAFKA_PRODUCER_RETRIES:3}
          batch-size: ${KAFKA_PRODUCER_BATCH_SIZE:16384}
        consumer:
          group-id: ${KAFKA_CONSUMER_GROUP}
          enable-auto-commit: ${KAFKA_CONSUMER_AUTO_COMMIT:true}
    
    logging:
      level:
        root: ${LOG_LEVEL}
        com.chant: ${LOG_LEVEL}
      pattern:
        console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
        file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    
    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics,prometheus
      endpoint:
        health:
          show-details: always
      metrics:
        export:
          prometheus:
            enabled: true
    
    # 自定义业务配置
    chant:
      api:
        rate-limit: ${API_RATE_LIMIT}
        timeout: ${API_TIMEOUT}
      cache:
        ttl: ${CACHE_TTL}
      cors:
        allowed-origins: ${CORS_ALLOWED_ORIGINS}
        allowed-methods: ${CORS_ALLOWED_METHODS}
        allowed-headers: ${CORS_ALLOWED_HEADERS}