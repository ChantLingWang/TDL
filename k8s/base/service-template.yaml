# Service模板 - 定义你的微服务如何被访问和发现
# 提供稳定的网络端点，实现服务发现和负载均衡

apiVersion: v1                   # k8s的Service API版本，service固定使用v1
kind: Service                    # 资源类型，告诉k8s这是一个service资源
# 上面两条配置，所有service都可以使用，不需要更改
metadata:                        # 服务身份信息
  name: ${SERVICE_NAME}          # 服务名称，K8s内部DNS使用，如：auth-service
  namespace: ${NAMESPACE}        # 服务所属的命名空间，如：chant
  labels:                        # 服务的标签，用于选择和筛选服务
    app: ${SERVICE_NAME}
    version: ${VERSION}
spec:                            # 服务类型
  type: ${SERVICE_TYPE:ClusterIP}  # 服务类型
  ports:
  - port: ${SERVICE_PORT}          # 服务端口（集群内部访问）
    targetPort: ${CONTAINER_PORT}  # 容器端口（Pod内部）
    name: http                      # 端口名称
    protocol: TCP
  selector:
    app: ${SERVICE_NAME}          # 选择哪些Pod属于这个Service
  sessionAffinity: ${SESSION_AFFINITY:None}  # 会话保持
