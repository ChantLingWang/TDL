apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: dev-chant
data:
  # 应用基本信息
  SERVICE_NAME: auth-service
  SERVICE_VERSION: v1.0.0
  ENVIRONMENT: dev
  LOG_LEVEL: info
  LOG_FORMAT: json
  
  # 服务器配置
  HOST: "0.0.0.0"
  PORT: "9030"
  
  # 数据库配置
  DB_HOST: mongodb
  DB_PORT: "27017"
  DB_NAME: auth
  DB_CHARSET: utf8mb4
  MONGODB_URL: "mongodb://host.docker.internal:27017"
  DATABASE_NAME: auth

  # Redis配置
  REDIS_HOST: host.docker.internal
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  
  # JWT配置
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "120"
  
  # CORS配置
  ALLOWED_ORIGINS: "*"
  ALLOWED_METHODS: "*"
  ALLOWED_HEADERS: "*"
  
  # 邮箱配置
  SMTP_SERVER: "smtp.qq.com"
  SMTP_PORT: "587"
  SMTP_USERNAME: "809595872@qq.com"
  
  # Kafka配置
  KAFKA_BROKERS: host.docker.internal:9092
  KAFKA_CONSUMER_GROUP: auth-service-group
  
  # gRPC配置
  GRPC_PORT: "50051"
    
  # 健康检查配置
  HEALTH_CHECK_INTERVAL: "30"
  HEALTH_CHECK_TIMEOUT: "5"
