# Kustomization配置 - 用于验证核心功能
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 基础资源：Service、Deployment和ConfigMap配置
resources:
- service.yaml
- deployment.yaml
- configmap.yaml

# 命名空间
namespace: dev-chant

# 通用标签
commonLabels:
  service: auth
  team: platform
  tier: backend
  environment: dev

# 通用注释
commonAnnotations:
  description: "认证授权服务 - 由Kustomize自动生成"
  owner: "platform-team"
  created-by: "kustomize"

# 镜像配置：一键更新镜像版本
images:
- name: auth-service
  newName: chant/auth-service
  newTag: v1.0.0