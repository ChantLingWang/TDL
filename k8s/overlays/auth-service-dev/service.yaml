# auth-service的Service配置
# 继承base模板，提供具体的网络访问端点

apiVersion: v1
kind: Service
metadata:
  name: auth-service  # 具体的服务名称
  namespace: dev-chant    # 命名空间
  labels:
    app: auth-service
    service: auth
    version: v1.0.0
    team: platform
spec:
  type: ClusterIP  # 集群内部访问，微服务间调用
  ports:
  - port: 80          # Service端口：集群内访问用
    targetPort: 8080  # Pod端口：auth-service容器实际监听端口
    name: http        # 端口名称
    protocol: TCP
  selector:
    app: auth-service  # 选择标签为app=auth-service的Pod
  sessionAffinity: None  # 不保持会话，负载均衡到任意Pod
