server:
  port: 8080
  name: "orchestrator-service"

default_timeout: 30s
default_retry_count: 3
compensation_timeout: 15s
snowflake_node_id: 1

kafka:
  brokers:
    - "kafka:29092"
  group_id: "orchestrator-group"
  topic: "saga-events"
  client_id: "orchestrator-service"

database:
  host: "postgres"
  port: "5432"
  user: "postgres"
  password: "postgres"
  dbname: "orchestrator"
  sslmode: "disable"
  timezone: "Asia/Shanghai"

templates:
  path: "templates/example_yaml"

saga:
  execution_timeout: 5m
  max_concurrent_sagas: 100
  enable_step_retry: true

monitoring:
  enable_health_check: true
  enable_metrics: true
